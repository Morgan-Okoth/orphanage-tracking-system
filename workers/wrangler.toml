name = "financial-transparency-api"
main = "api/index.ts"
compatibility_date = "2024-09-23"
account_id = "fd674dbcc2935f7d4c8c3743b8c5d95a"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 2 * * *"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "financial-transparency-db"
database_id = "e4bf2bfa-d6ad-4d01-82eb-5122337bc998"

# R2 Storage
[[r2_buckets]]
binding = "DOCUMENTS_BUCKET"
bucket_name = "financial-documents"

[[r2_buckets]]
binding = "BACKUPS_BUCKET"
bucket_name = "financial-backups"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "1eab3193fdba43b180aba4fc9ef79b5c"

[[kv_namespaces]]
binding = "SESSIONS"
id = "88b90cd1b76f4e07afa3a62ce8efd2a8"

# Queues
[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-notifications"

[[queues.producers]]
binding = "SMS_QUEUE"
queue = "sms-notifications"

[[queues.consumers]]
queue = "email-notifications"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "email-notifications-dlq"

[[queues.consumers]]
queue = "sms-notifications"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "sms-notifications-dlq"

# Workers AI
[ai]
binding = "AI"

# ─── Development environment ──────────────────────────────────────────────────
[vars]
ENVIRONMENT = "development"
JWT_EXPIRY = "3600"
REFRESH_TOKEN_EXPIRY = "604800"
INTASEND_SECRET_KEY = "ISSecretKey_live_81385c5e-be68-4101-93d8-e2b11b2d00f7"
INTASEND_CALLBACK_URL = "https://financial-transparency-api.morgan-ent.workers.dev/api/v1/payments/webhook"
INTASEND_PUBLISHABLE_KEY = "ISPubKey_live_24e373a7-0100-4aa2-9585-cab9a7c266e9"

# ─── Production environment ───────────────────────────────────────────────────
[env.production]
name = "financial-transparency-api"

[env.production.ai]
binding = "AI"

[env.production.vars]
ENVIRONMENT = "production"
JWT_EXPIRY = "3600"
REFRESH_TOKEN_EXPIRY = "604800"
INTASEND_SECRET_KEY = "ISSecretKey_live_81385c5e-be68-4101-93d8-e2b11b2d00f7"
INTASEND_CALLBACK_URL = "https://financial-transparency-api.morgan-ent.workers.dev/api/v1/payments/webhook"
INTASEND_PUBLISHABLE_KEY = "ISPubKey_live_24e373a7-0100-4aa2-9585-cab9a7c266e9"

[[env.production.d1_databases]]
binding = "DB"
database_name = "financial-transparency-db"
database_id = "e4bf2bfa-d6ad-4d01-82eb-5122337bc998"

[[env.production.r2_buckets]]
binding = "DOCUMENTS_BUCKET"
bucket_name = "financial-documents-prod"

[[env.production.r2_buckets]]
binding = "BACKUPS_BUCKET"
bucket_name = "financial-backups-prod"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "1eab3193fdba43b180aba4fc9ef79b5c"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "88b90cd1b76f4e07afa3a62ce8efd2a8"

[[env.production.queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-notifications-prod"

[[env.production.queues.producers]]
binding = "SMS_QUEUE"
queue = "sms-notifications-prod"

[[env.production.queues.consumers]]
queue = "email-notifications-prod"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "email-notifications-prod-dlq"

[[env.production.queues.consumers]]
queue = "sms-notifications-prod"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "sms-notifications-prod-dlq"

# Secrets (set with: wrangler secret put <NAME> --env production)
# JWT_SECRET
# ENCRYPTION_KEY  - Must be a 64-char hex string (32 bytes for AES-256-GCM)
#                   Generate: openssl rand -hex 32
# INTASEND_SECRET_KEY
# INTASEND_CALLBACK_URL
# INTASEND_WEBHOOK_CHALLENGE
# INTASEND_DEVICE_ID
# RESEND_API_KEY
# AT_API_KEY
# AT_USERNAME
# AT_SENDER_ID
